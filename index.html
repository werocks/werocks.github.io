<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rock Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1117;
    color:white;
}

header{
    height:70px;
    background:#161b22;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search{
    width:300px;
    height:40px;
    border:none;
    outline:none;
    border-radius:8px;
    padding:10px;
    background:#21262d;
    color:white;
}

.profile{
    display:flex;
    align-items:center;
    gap:20px;
    padding:30px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#21262d;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

.username{
    font-size:32px;
    font-weight:bold;
}

.add-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    font-size:28px;
    cursor:pointer;
    background:#3fb950;
    color:white;
}

.section{
    padding:20px;
}

.section h2{
    margin-bottom:20px;
}

.games{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding-bottom:10px;
}

.games::-webkit-scrollbar{
    height:10px;
}

.games::-webkit-scrollbar-thumb{
    background:#30363d;
    border-radius:10px;
}

.card{
    min-width:250px;
    background:#161b22;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-body{
    padding:12px;
}

.card-title{
    font-size:18px;
    font-weight:bold;
}

.card-sub{
    color:#8b949e;
    margin-top:5px;
}

.empty{
    color:#8b949e;
}

</style>
</head>

<body>

<header>

<div class="logo">
Rock Games
</div>

<input
id="search"
class="search"
placeholder="Search..."
>

</header>

<div class="profile">

<div class="avatar">
🪨
</div>

<div>

<div
class="username"
id="username">
Loading...
</div>

</div>

<button
class="add-btn"
onclick="alert('Coming Soon')">
+
</button>

</div>

<div class="section">

<h2>Most Popular</h2>

<div
class="games"
id="popular">
</div>

</div>

<div class="section">

<h2>Recently Played</h2>

<div
class="games"
id="recent">
</div>

</div>

<div class="section">

<h2>Trending</h2>

<div
class="games"
id="trending">
</div>

</div>

<script>

const names = [
"rockplayer",
"rockeater",
"rocklover",
"ieatrocks",
"rocksarelife",
"rockingg"
];

let username =
localStorage.getItem(
"rock_username"
);

if(!username){

    const base =
    names[
        Math.floor(
            Math.random() *
            names.length
        )
    ];

    const num =
    Math.floor(
        Math.random() *
        (204945 - 12039 + 1)
    ) + 12039;

    username =
    base + num;

    localStorage.setItem(
        "rock_username",
        username
    );

}

document
.getElementById(
"username"
)
.textContent =
username;

const games = [

{
name:"Veck.io",
type:"website",
image:"https://www.google.com/s2/favicons?domain=veck.io&sz=256",
url:"https://veck.io"
},

{
name:"StealNow.io",
type:"website",
image:"https://www.google.com/s2/favicons?domain=stealnow.io&sz=256",
url:"https://stealnow.io"
},

{
name:"Growden.io",
type:"website",
image:"https://www.google.com/s2/favicons?domain=growden.io&sz=256",
url:"https://growden.io"
},

{
name:"DressNow.io",
type:"website",
image:"https://www.google.com/s2/favicons?domain=dressnow.io&sz=256",
url:"https://dressnow.io"
},

{
name:"Obby: +1 Jump Per Click",
type:"html",
image:"https://placehold.co/512x512?text=Jump",
file:"games/jump.html"
},

{
name:"Obby Climb For Brainrots",
type:"html",
image:"https://placehold.co/512x512?text=Brainrots",
file:"games/brainrots.html"
},

{
name:"Obby Cart",
type:"html",
image:"https://placehold.co/512x512?text=Cart",
file:"games/cart.html"
},

{
name:"Obby 99% Will Lose",
type:"html",
image:"https://placehold.co/512x512?text=Lose",
file:"games/lose99.html"
},

{
name:"Obby But You're On A Bike",
type:"html",
image:"https://placehold.co/512x512?text=Bike",
file:"games/bike.html"
},

{
name:"Obby For Lumber",
type:"html",
image:"https://placehold.co/512x512?text=Lumber",
file:"games/lumber.html"
},

{
name:"Obby Rainbow Tower",
type:"html",
image:"https://placehold.co/512x512?text=Rainbow",
file:"games/rainbow.html"
}

];

function addRecent(game){

    let recent =
    JSON.parse(
        localStorage.getItem(
            "recent_games"
        )
    ) || [];

    recent =
    recent.filter(
        g => g.name !== game.name
    );

    recent.unshift(game);

    recent =
    recent.slice(0,10);

    localStorage.setItem(
        "recent_games",
        JSON.stringify(recent)
    );

}

function launchGame(game){

    addRecent(game);

    renderRecent();

    const win =
    window.open(
        "about:blank",
        "_blank"
    );

    if(!win){
        alert(
            "Popup blocked."
        );
        return;
    }

    if(game.type === "website"){

        win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
        <title>${game.name}</title>
        <style>
        html,body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
        }
        </style>
        </head>
        <body>
        <iframe src="${game.url}"></iframe>
        </body>
        </html>
        `);

        return;
    }

    fetch(game.file)
    .then(r => r.text())
    .then(html => {

        win.document.open();
        win.document.write(html);
        win.document.close();

    })
    .catch(() => {

        win.document.write(`
        <h1 style="
        font-family:sans-serif;
        text-align:center;
        margin-top:40px;
        ">
        Failed To Load Game
        </h1>
        `);

    });

}

function createCard(game){

    const card =
    document.createElement(
        "div"
    );

    card.className =
    "card";

    card.dataset.name =
    game.name.toLowerCase();

    card.innerHTML = `
    <img src="${game.image}">
    <div class="card-body">

        <div class="card-title">
            ${game.name}
        </div>

        <div class="card-sub">
            ${
                game.type === "website"
                ? "Website"
                : "HTML Game"
            }
        </div>

    </div>
    `;

    card.onclick =
    () => launchGame(game);

    return card;

}

function renderPopular(){

    const container =
    document.getElementById(
        "popular"
    );

    container.innerHTML = "";

    games.forEach(game => {

        container.appendChild(
            createCard(game)
        );

    });

}

function renderTrending(){

    const container =
    document.getElementById(
        "trending"
    );

    container.innerHTML = "";

    [...games]
    .reverse()
    .forEach(game => {

        container.appendChild(
            createCard(game)
        );

    });

}

function renderRecent(){

    const container =
    document.getElementById(
        "recent"
    );

    container.innerHTML = "";

    const recent =
    JSON.parse(
        localStorage.getItem(
            "recent_games"
        )
    ) || [];

    if(
        recent.length === 0
    ){

        container.innerHTML =
        `
        <div class="empty">
        No Recently Played Games
        </div>
        `;

        return;
    }

    recent.forEach(game => {

        container.appendChild(
            createCard(game)
        );

    });

}

renderPopular();
renderTrending();
renderRecent();

document
.getElementById(
    "search"
)
.addEventListener(
    "input",
    function(){

        const value =
        this.value
        .toLowerCase();

        document
        .querySelectorAll(
            ".card"
        )
        .forEach(card => {

            const name =
            card.dataset.name;

            card.style.display =
            name.includes(value)
            ? ""
            : "none";

        });

    }
);

</script>

</body>
</html>
